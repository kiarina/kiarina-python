[project]
name = "kiarina-agi-audio"
version = "2.15.0"
description = "Audio sources, speech, tagging, embeddings, and voice activity for AI agents"
readme = "README.md"
license = "MIT"
authors = [{ name = "kiarina", email = "kiarinadawa@gmail.com" }]
maintainers = [{ name = "kiarina", email = "kiarinadawa@gmail.com" }]
keywords = ["ai", "agents", "audio", "speech", "embeddings"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "jaxtyping>=0.3.3",
    "kiarina-agi-base>=2.7.0",
    "kiarina-agi-data>=2.7.0",
    "kiarina-utils-app>=2.4.0",
    "kiarina-utils-common>=2.8.0",
    "kiarina-utils-file>=2.3.1",
    "numpy>=2.0,<3",
    "pydantic>=2.11.7,<3",
    "pydantic-settings>=2.10.1,<3",
    "pydantic-settings-manager>=3.2.0",
]

[project.optional-dependencies]
all = [
    "ai-edge-litert>=2.1.4,<3",
    "google-genai>=1.65.0,<3",
    "imageio-ffmpeg>=0.6.0,<1",
    "kiarina-lib-google>=2.4.0",
    "kiarina-lib-openai>=2.3.1",
    "onnxruntime>=1.25.1",
    "openai>=2.0.1,<3",
    "sounddevice>=0.5.2,<1",
    "soundfile>=0.13.1,<1",
    "tiktoken>=0.13.0",
]
asr-provider-google = ["google-genai>=1.65.0,<3", "kiarina-lib-google>=2.4.0"]
asr-provider-openai = ["kiarina-lib-openai>=2.3.1", "openai>=2.0.1,<3"]
audio-embedding-provider-clap-onnx = ["onnxruntime>=1.25.1"]
audio-embedding-provider-ecapa-tdnn-onnx = ["onnxruntime>=1.25.1"]
audio-source-file = ["soundfile>=0.13.1,<1"]
audio-source-mic = ["sounddevice>=0.5.2,<1"]
audio-tagging-provider-yamnet = ["ai-edge-litert>=2.1.4,<3"]
scd-provider-pyannote = ["onnxruntime>=1.25.1"]
tts-provider-google = [
    "google-genai>=1.65.0,<3",
    "imageio-ffmpeg>=0.6.0,<1",
    "kiarina-lib-google>=2.4.0",
]
tts-provider-mock = [
    "imageio-ffmpeg>=0.6.0,<1",
]
tts-provider-command = [
    "imageio-ffmpeg>=0.6.0,<1",
]
tts-provider-openai = [
    "imageio-ffmpeg>=0.6.0,<1",
    "kiarina-lib-openai>=2.3.1",
    "openai>=2.0.1,<3",
    "tiktoken>=0.13.0",
]
vad-provider-silero = ["onnxruntime>=1.25.1"]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-agi-audio/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-agi-audio#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
