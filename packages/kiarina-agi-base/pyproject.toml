[project]
name = "kiarina-agi-base"
version = "2.6.0"
description = "Core types, contexts, logging, recording, and token utilities for building AI agents"
readme = "README.md"
license = "MIT"
authors = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
maintainers = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
keywords = ["ai", "agents", "logging", "tokens", "utilities"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "jaxtyping>=0.3.3",
    "kiarina-currency>=2.3.1",
    "kiarina-i18n>=2.3.1",
    "kiarina-utils-app>=2.3.0",
    "kiarina-utils-common>=2.3.0",
    "kiarina-utils-file>=2.3.1",
    "numpy>=2.0",
    "pydantic>=2.11.7",
    "pydantic-settings>=2.10.1",
    "pydantic-settings-manager>=3.2.0",
    "pyyaml>=6.0.2",
    "tiktoken>=0.13.0",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-agi-base/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-agi-base#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
