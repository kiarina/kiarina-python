[project]
name = "kiarina-agi-data-builder"
version = "2.13.0"
description = "Data building utilities for AI agents"
readme = "README.md"
license = "MIT"
authors = [{ name = "kiarina", email = "kiarinadawa@gmail.com" }]
maintainers = [{ name = "kiarina", email = "kiarinadawa@gmail.com" }]
keywords = ["ai", "agents", "data", "files", "builders"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "kiarina-agi-audio>=2.9.0",
    "kiarina-agi-base>=2.7.0",
    "kiarina-agi-data>=2.7.0",
    "kiarina-agi-file>=2.8.0",
    "kiarina-agi-tool>=2.12.0",
    "kiarina-agi-video>=2.10.0",
    "kiarina-i18n>=2.3.1",
    "kiarina-utils-app>=2.4.0",
    "kiarina-utils-common>=2.8.0",
    "kiarina-utils-file>=2.3.1",
    "pydantic>=2.11.7,<3",
    "pydantic-settings>=2.10.1,<3",
    "pydantic-settings-manager>=3.2.0",
    "pyyaml>=6.0.2",
]

[project.optional-dependencies]
all = [
    "imageio-ffmpeg>=0.6.0,<1",
    "moviepy>=2.2.1,<3",
    "pillow>=11.3.0,<12",
    "pypdf>=6.7.4,<7",
    "soundfile>=0.13.1,<1",
]
file-info-builder-audio = [
    "imageio-ffmpeg>=0.6.0,<1",
    "soundfile>=0.13.1,<1",
]
file-info-builder-image = ["pillow>=11.3.0,<12"]
file-info-builder-pdf = ["pypdf>=6.7.4,<7"]
file-info-builder-video = ["moviepy>=2.2.1,<3"]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-agi-data-builder/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-agi-data-builder#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
