[project]
name = "kiarina-agi-file"
version = "2.5.0"
description = "File, cache, and repository abstractions for AI agents"
readme = "README.md"
license = "MIT"
authors = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
maintainers = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
keywords = ["ai", "agents", "file", "cache", "repository", "gcs"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Filesystems",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "kiarina-agi-base>=2.4.0",
    "kiarina-lib-google>=2.3.1",
    "kiarina-utils-app>=2.4.0",
    "kiarina-utils-common>=2.3.0",
    "kiarina-utils-file>=2.3.1",
    "pydantic>=2.11.7",
    "pydantic-settings>=2.10.1",
    "pydantic-settings-manager>=3.2.0",
]

[project.optional-dependencies]
asset-repository-gcs = [
    "google-cloud-storage>=3.4.0",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-agi-file/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-agi-file#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
