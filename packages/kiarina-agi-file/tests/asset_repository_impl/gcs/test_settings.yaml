kiarina.lib.google:
  default: service_account
  configs:
    service_account:
      type: service_account
      project_id: kiarina
      service_account_email: kiarina-python@kiarina.iam.gserviceaccount.com
      service_account_file: ~/.gcp/service-account/kiarina/kiarina-python/key.json
kiarina.agi.file.asset_repository:
  default: gcs
  uri_policy:
    allowed_uri_patterns:
      - "gs://kiarina-python/agi/agents/{agent_id}/data/.*"
      - "gs://kiarina-python/agi/agents/{agent_id}/cache/.*"
    data_dir_uri_template: "gs://kiarina-python/agi/agents/{agent_id}/data/"
    cache_dir_uri_template: "gs://kiarina-python/agi/agents/{agent_id}/cache/"
