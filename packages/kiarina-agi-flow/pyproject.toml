[project]
name = "kiarina-agi-flow"
version = "2.10.0"
description = "Prompt, section, state, and workflow orchestration for AI agents"
readme = "README.md"
license = "MIT"
authors = [{ name = "kiarina", email = "kiarinadawa@gmail.com" }]
maintainers = [{ name = "kiarina", email = "kiarinadawa@gmail.com" }]
keywords = ["ai", "agents", "flow", "prompt", "workflow"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "kiarina-agi-base>=2.7.0",
    "kiarina-agi-data>=2.7.0",
    "kiarina-agi-text>=2.8.0",
    "kiarina-i18n>=2.3.1",
    "kiarina-utils-common>=2.8.0",
    "pydantic>=2.11.7,<3",
    "pydantic-settings>=2.10.1,<3",
    "pydantic-settings-manager>=3.2.0",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-agi-flow/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-agi-flow#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
