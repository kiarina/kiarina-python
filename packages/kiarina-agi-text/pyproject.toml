[project]
name = "kiarina-agi-text"
version = "2.6.0"
description = "Chat and text embedding abstractions for AI agents"
readme = "README.md"
license = "MIT"
authors = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
maintainers = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
keywords = ["ai", "agents", "chat", "embeddings", "langchain"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "kiarina-agi-base>=2.6.0",
    "kiarina-agi-data>=2.6.0",
    "kiarina-agi-file>=2.6.0",
    "kiarina-utils-app>=2.4.0",
    "kiarina-utils-common>=2.3.0",
    "kiarina-utils-file>=2.3.1",
    "langchain>=1.0.0,<2",
    "langchain-core>=1.0.0,<2",
    "pydantic>=2.11.7",
    "pydantic-settings>=2.10.1",
    "pydantic-settings-manager>=3.2.0",
]

[project.optional-dependencies]
all = [
    "anthropic>=0.84.0,<1",
    "google-genai>=1.65.0,<3",
    "kiarina-lib-google>=2.3.1",
    "kiarina-lib-openai>=2.3.1",
    "langchain-anthropic>=1.0.0,<2",
    "langchain-google-genai>=4.0.0,<5",
    "langchain-google-vertexai>=3.0.0,<4",
    "langchain-openai>=1.0.0,<2",
    "numpy>=2.0",
    "openai>=2.0.1,<3",
    "tiktoken>=0.13.0",
    "ulid-py>=1.1.0",
]
chat-provider-lc-anthropic = [
    "anthropic>=0.84.0,<1",
    "langchain-anthropic>=1.0.0,<2",
]
chat-provider-lc-anthropic-vertex = [
    "anthropic>=0.84.0,<1",
    "kiarina-lib-google>=2.3.1",
    "langchain-anthropic>=1.0.0,<2",
    "langchain-google-vertexai>=3.0.0,<4",
]
chat-provider-lc-google-genai = [
    "google-genai>=1.65.0,<3",
    "kiarina-lib-google>=2.3.1",
    "langchain-google-genai>=4.0.0,<5",
]
chat-provider-lc-openai = [
    "kiarina-lib-openai>=2.3.1",
    "langchain-openai>=1.0.0,<2",
    "openai>=2.0.1,<3",
]
chat-provider-mock = [
    "ulid-py>=1.1.0",
]
text-embedding-provider-google = [
    "google-genai>=1.65.0,<3",
    "kiarina-lib-google>=2.3.1",
    "numpy>=2.0",
]
text-embedding-provider-mock = [
    "numpy>=2.0",
]
text-embedding-provider-openai = [
    "kiarina-lib-openai>=2.3.1",
    "numpy>=2.0",
    "openai>=2.0.1,<3",
    "tiktoken>=0.13.0",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-agi-text/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-agi-text#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
