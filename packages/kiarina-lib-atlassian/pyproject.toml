[project]
name = "kiarina-lib-atlassian"
version = "1.37.0"
description = "Atlassian API integration with configuration management"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "kiarina", email = "kiarina@example.com" }]
keywords = ["atlassian", "jira", "confluence", "api", "configuration"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.10.5",
    "pydantic-settings>=2.7.1",
    "pydantic-settings-manager>=2.3.0",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-lib-atlassian"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-lib-atlassian/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]

[dependency-groups]
dev = []
