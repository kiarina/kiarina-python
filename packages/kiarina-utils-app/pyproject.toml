[project]
name = "kiarina-utils-app"
version = "0.1.0"
description = "Application foundation utilities: startup configuration, user directory resolution, and single-instance control"
readme = "README.md"
license = "MIT"
authors = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
maintainers = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
keywords = [
    "application", "cli", "user-directory", "xdg", "platformdirs",
    "single-instance", "filelock", "configuration",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "filelock>=3.19.1",
    "platformdirs>=4.10.0",
    "pydantic>=2.11.7",
    "pydantic-settings>=2.10.1",
    "pydantic-settings-manager>=3.2.0",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/packages/kiarina-utils-app/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python/tree/main/packages/kiarina-utils-app#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiarina"]
