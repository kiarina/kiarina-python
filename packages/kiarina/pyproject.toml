[project]
name = "kiarina"
version = "2.9.0"
description = "A comprehensive namespace package collection providing essential utilities for modern Python development"
readme = "README.md"
license = "MIT"
authors = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
maintainers = [
    { name = "kiarina", email = "kiarinadawa@gmail.com" }
]
keywords = [
    "utilities",
    "namespace-package",
    "file-io",
    "llm",
    "redis",
    "falkordb",
    "redisearch",
    "async",
    "pydantic"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Typing :: Typed",
]
requires-python = ">=3.12"
dependencies = [
    "kiarina-agi-audio>=2.9.0",
    "kiarina-agi-base>=2.7.0",
    "kiarina-agi-data>=2.7.0",
    "kiarina-agi-file>=2.8.0",
    "kiarina-agi-image>=2.9.0",
    "kiarina-agi-text>=2.8.0",
    "kiarina-agi-video>=2.9.0",
    "kiarina-currency>=2.3.1",
    "kiarina-i18n>=2.3.1",
    "kiarina-lib-anthropic>=2.3.1",
    "kiarina-lib-cloudflare>=2.3.1",
    "kiarina-lib-cloudflare-d1>=2.3.1",
    "kiarina-lib-falkordb>=2.3.1",
    "kiarina-lib-firebase>=2.3.1",
    "kiarina-lib-firebase-rtdb>=2.3.1",
    "kiarina-lib-google>=2.8.0",
    "kiarina-lib-openai>=2.3.1",
    "kiarina-lib-redis>=2.3.1",
    "kiarina-lib-redisearch>=2.3.1",
    "kiarina-lib-slack>=2.3.1",
    "kiarina-utils-app>=2.4.0",
    "kiarina-utils-common>=2.8.0",
    "kiarina-utils-file>=2.3.1",
]

[project.urls]
Homepage = "https://github.com/kiarina/kiarina-python"
Repository = "https://github.com/kiarina/kiarina-python.git"
Issues = "https://github.com/kiarina/kiarina-python/issues"
Changelog = "https://github.com/kiarina/kiarina-python/blob/main/CHANGELOG.md"
Documentation = "https://github.com/kiarina/kiarina-python#readme"
