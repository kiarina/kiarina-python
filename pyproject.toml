[dependency-groups]
dev = [
    "ruff>=0.12.0",
    "mypy>=1.17.0",
    "pytest>=8.4.0",
    "pytest-cov>=6.2.0",
    "pytest-asyncio>=1.1.0",
    "pytest-mock>=3.14.0",
    "pre-commit>=4.3.0",
    "types-aiofiles>=24.1.0.20250809",
    "types-pyyaml>=6.0.12.20250809",
]
test = [
    "pytest>=8.4.0",
    "pytest-cov>=6.2.0",
    "pytest-asyncio>=1.1.0",
    "pytest-mock>=3.14.0",
]

[tool.uv.workspace]
members = [
    "packages/kiarina",
    "packages/kiarina-currency",
    "packages/kiarina-i18n",
    "packages/kiarina-lib-anthropic",
    "packages/kiarina-lib-cloudflare",
    "packages/kiarina-lib-cloudflare-d1",
    "packages/kiarina-lib-falkordb",
    "packages/kiarina-lib-firebase",
    "packages/kiarina-lib-firebase-rtdb",
    "packages/kiarina-lib-google",
    "packages/kiarina-lib-openai",
    "packages/kiarina-lib-redis",
    "packages/kiarina-lib-redisearch",
    "packages/kiarina-lib-slack",
    "packages/kiarina-utils-app",
    "packages/kiarina-utils-common",
    "packages/kiarina-utils-file",
]

[tool.uv.sources]
kiarina = { workspace = true }
kiarina-currency = { workspace = true }
kiarina-i18n = { workspace = true }
kiarina-lib-anthropic = { workspace = true }
kiarina-lib-cloudflare = { workspace = true }
kiarina-lib-cloudflare-d1 = { workspace = true }
kiarina-lib-falkordb = { workspace = true }
kiarina-lib-firebase = { workspace = true }
kiarina-lib-firebase-rtdb = { workspace = true }
kiarina-lib-google = { workspace = true }
kiarina-lib-openai = { workspace = true }
kiarina-lib-redis = { workspace = true }
kiarina-lib-redisearch = { workspace = true }
kiarina-lib-slack = { workspace = true }
kiarina-utils-app = { workspace = true }
kiarina-utils-common = { workspace = true }
kiarina-utils-file = { workspace = true }

[tool.mypy]
mypy_path = [
    "packages/kiarina-currency/src",
    "packages/kiarina-i18n/src",
    "packages/kiarina-lib-anthropic/src",
    "packages/kiarina-lib-cloudflare/src",
    "packages/kiarina-lib-cloudflare-d1/src",
    "packages/kiarina-lib-falkordb/src",
    "packages/kiarina-lib-firebase/src",
    "packages/kiarina-lib-firebase-rtdb/src",
    "packages/kiarina-lib-google/src",
    "packages/kiarina-lib-openai/src",
    "packages/kiarina-lib-redis/src",
    "packages/kiarina-lib-redisearch/src",
    "packages/kiarina-lib-slack/src",
    "packages/kiarina-utils-app/src",
    "packages/kiarina-utils-common/src",
    "packages/kiarina-utils-file/src",
]
namespace_packages = true
explicit_package_bases = true
show_error_codes = true
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "session"
asyncio_default_fixture_loop_scope = "session"

[tool.coverage.run]
source = [
    "packages/kiarina-currency/src",
    "packages/kiarina-i18n/src",
    "packages/kiarina-lib-anthropic/src",
    "packages/kiarina-lib-cloudflare/src",
    "packages/kiarina-lib-cloudflare-d1/src",
    "packages/kiarina-lib-falkordb/src",
    "packages/kiarina-lib-firebase/src",
    "packages/kiarina-lib-firebase-rtdb/src",
    "packages/kiarina-lib-google/src",
    "packages/kiarina-lib-openai/src",
    "packages/kiarina-lib-redis/src",
    "packages/kiarina-lib-redisearch/src",
    "packages/kiarina-lib-slack/src",
    "packages/kiarina-utils-app/src",
    "packages/kiarina-utils-common/src",
    "packages/kiarina-utils-file/src",
]
parallel = false
data_file = ".coverage"

[tool.coverage.paths]
source = [
    "packages/*/src/kiarina/",
    "*/site-packages/kiarina/",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 2

[tool.coverage.xml]
output = "coverage.xml"
